<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login Clone</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background-color: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    max-width: 900px;
    width: 100%;
}

/* Phone mockup (hidden on small screens) */
.phone-image {
    flex: 1;
    display: flex;
    justify-content: center;
}

.phone-image img {
    max-width: 380px;
    width: 100%;
}

/* Login Section */
.container {
    flex: 1;
    max-width: 350px;
    width: 100%;
}

.login-box {
    background: #fff;
    border: 1px solid #dbdbdb;
    padding: 40px 40px 20px;
    text-align: center;
}

.logo {
    font-family: 'Segoe Script', cursive;
    font-size: 40px;
    margin-bottom: 30px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    background: #fafafa;
    border: 1px solid #dbdbdb;
    border-radius: 3px;
    font-size: 12px;
}

input:focus {
    outline: none;
    border: 1px solid #a8a8a8;
}

button {
    width: 100%;
    padding: 8px;
    margin-top: 12px;
    background-color: #0095f6;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #007ed6;
}

.divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
    font-size: 12px;
    color: #8e8e8e;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #dbdbdb;
}

.divider::before { margin-right: 10px; }
.divider::after { margin-left: 10px; }

.fb-login {
    color: #385185;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 15px;
    cursor: pointer;
}

.forgot {
    font-size: 12px;
    color: #00376b;
    text-decoration: none;
}

.signup-box {
    background: #fff;
    border: 1px solid #dbdbdb;
    text-align: center;
    padding: 20px;
    margin-top: 10px;
    font-size: 14px;
}

.signup-box a {
    color: #0095f6;
    font-weight: bold;
    text-decoration: none;
}

/* Responsive Design */

/* Tablet */
@media (max-width: 900px) {
    .wrapper {
        gap: 20px;
    }
    .phone-image img {
        max-width: 300px;
    }
}

/* Mobile */
@media (max-width: 768px) {
    .wrapper {
        flex-direction: column;
    }

    .phone-image {
        display: none;
    }

    .container {
        max-width: 100%;
    }

    .login-box {
        padding: 30px 25px 15px;
    }
}

/* Small Mobile */
@media (max-width: 400px) {
    .login-box {
        border: none;
        padding: 20px 15px;
    }

    .signup-box {
        border: none;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <!-- Optional phone mockup image -->
    <div class="phone-image">
        <img src="https://www.vecteezy.com/free-png/instagram-logo-black" alt="Instagram preview">
    </div>

    <div class="container">

        <div class="login-box">
            <div class="logo">Instagram</div>

            <form>
                <input type="text" placeholder="Phone number, username, or email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>

            <div class="divider">OR</div>

            <div class="fb-login">Log in with Facebook</div>

            <a href="#" class="forgot">Forgot password?</a>
        </div>

        <div class="signup-box">
            Don't have an account? <a href="#">Sign up</a>
        </div>

    </div>

</div>

</body>
</html>
