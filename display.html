<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }
        .container{
            border: 2px solid black;
            padding: 20px;
            margin-bottom: 30px;
        }
        .box{
            background-color: lightblue;
            border: 1px solid blue;
            padding: 5px;
            margin: 10px;
        }
        .block{
            display: block;
            height: 50px;
            width: 200px;
        }
        .inline{
            display: inline;
            height: 50px;
            width: 200px;
        }
        .inline-block{
            display: inline-block;
            height: 50px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h2>Block Display</h2>
    <div class="container">
        <div class="box block">Block</div>
        <div class="box block">Block</div>
        <div class="box block">Block</div>
    </div>
    <h2>Inline Display</h2>
    <div class="container">
        <div class="box inline">Inline</div>
        <div class="box inline">Inline</div>
        <div class="box inline">Inline</div>
    </div>
    <h2>Inline-block Display</h2>
    <div class="container">
        <div class="box inline-block">Inline-block</div>
        <div class="box inline-block">Inline-block</div>
        <div class="box inline-block">Inline-block</div>
    </div>
</body>
</html>
