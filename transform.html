<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition</title>
    <style>
        body{
            background-color: darkblue;
            height: 130vh;
            padding: 20px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            height: 130vh;
            border: 1px solid #dbdbdb;
            padding: 10px;
            margin: 10px;
        }
        .translate{
            height: 180px;
            width: 180px;
            background-color: lightseagreen;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .translate:hover{
            transform: translateY(-30px)
        }
        .rotate{
            height: 180px;
            width: 180px;
            background-color: chartreuse;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .rotate:hover{
            transform: rotate(45deg);
        }
        .rotate-x{
            height: 180px;
            width: 180px;
            background-color: crimson;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .rotate-x:hover{
            transform: rotateX(45deg);
        }
        .skew{
            height: 180px;
            width: 180px;
            background-color: lightseagreen;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .skew:hover{
            transform: skew(20deg);
        }
        .scale{
            height: 180px;
            width: 180px;
            background-color: lightcoral;
            border-radius: 10px;
        }
        .scale:hover{
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="translate"></div>
        <div class="rotate"></div>
        <div class="rotate-x"></div>
        <div class="skew"></div>
        <div class="scale"></div>
    </div>
</body>
</html>
