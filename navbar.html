<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Easy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        nav{
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        nav h3{
            color: white;
        }

        nav ul{
            list-style: none;
        }

        nav ul li{
            display: inline-block;
            margin-left: 25px;
        }

        nav ul li a{
            color: white;
            text-decoration: none;
            font-size: 16px;

        }

        nav ul li a:hover{
            color: orange;
        }

        .content{
            padding: 40px;
        }
    </style>
</head>

<body>

    <nav>
        <h3>Shop Easy</h3>
        <ul>
            <li><a href="#Home">Home</a></li>
            <li><a href="#Product">Products</a></li>
            <li><a href="#About">About</a></li>
            <li><a href="#Contact">Contact</a></li>
        </ul>
    </nav>

    <div class="content">
        <h2>Welcome to Shop Easy!</h2>
        <p>This is a simple static HTML page.</p>
    </div>

</body>
</html>
