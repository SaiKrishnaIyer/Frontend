<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic JavaScript</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: darkcyan;
            height: 100vh;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            text-align: center;
        }
        h1{
            font-size: 20px;
            margin-bottom: 20px;
            margin-top: 10px;
            color: white;
        }
        button{
            background-color: darkblue;
            width: 10%;
            border: none;
            padding: 5px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Welcome To Dynamic JavaScript</h1>
    <button onclick="add()">Click Me</button>
    <script src="dynamic.js"></script>
</body>
</html>
