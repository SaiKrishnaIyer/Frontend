<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow</title>
    <style>
        body{
            background-color: #06ef;
            height: 100vh;
        }
        .overflow-container{
            background-color: blueviolet;
            border: 2px solid black;
            height: 80px;
            width: 300px;
            overflow: auto;
            color: white;
        }
    </style>
</head>
<body>
    <div class="overflow-container">
        <p>This is a paragraph with overflow content. It will scroll if it overflows.
            This is a paragraph with overflow content. It will scroll if it overflows.
        </p>
    </div>
</body>
</html>
