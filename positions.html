<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>
    <style>
        body{
            background-color: cornflowerblue;
            height: 100vh;
        }
        .positions{
            margin: 10px;
            padding: 10px;
            color: white;
            width: 500px;
        }
        .relative{
            background-color: navy;
            padding: 15px;
            margin: 10px;
            position: relative;
            top: 30px;
        }
        .absolute{
            background-color: crimson;
            padding: 15px;
            margin: 10px;
            position: absolute;
            bottom: 30px;
        }
        .fixed{
            background-color: darkseagreen;
            padding: 15px;
            margin: 10px;
            position: fixed;
            bottom: 20px;
        }
        .sticky{
            background-color: darkcyan;
            color: white;
            padding: 10px;
            position: sticky;
            top: 10px;
        }   
    </style>
</head>
<body>
    <div class = "positions">
        <div class="relative">Relative position opp directions</div>
        <div class="absolute">Out of the box same directions</div>
        <div class="fixed">Fixed at the same positions</div>
    </div>
    <div class="sticky">When its turn's fixed to their positions. </div>
</body>
</html>
